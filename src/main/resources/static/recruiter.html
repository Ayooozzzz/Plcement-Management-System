<!DOCTYPE html>
<html>
<head>
  <title>Recruiter</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="sidebar">
  <h3>Recruiter</h3>
  <p onclick="showSection('add')">Add Job</p>
  <p onclick="showSection('applications')">Applications</p>
</div>

<div class="main">

  <div id="add" class="section">
    <h2>Add Job</h2>
    <input id="company" placeholder="Company">
    <input id="role" placeholder="Role">
    <input id="criteria" placeholder="Criteria">
    <button onclick="addJob()">Add Job</button>
  </div>

  <div id="applications" class="section" style="display:none;">
    <h2>Applications</h2>
    <div id="applicationsData"></div>
  </div>

</div>

<script src="script.js"></script>

</body>
</html>
